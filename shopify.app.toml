# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4e3f8a22fc4e05b7bc299b8f92a03b45"
name = "SnapTip"
application_url = "https://app.snaptip.tech"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "https://snaptip.tech/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://snaptip.tech/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "https://snaptip.tech/webhooks/app_subscriptions/update"

  [[webhooks.subscriptions]]
  uri = "https://snaptip.tech/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_publications,write_cart_transforms,write_products,write_publications"

[auth]
redirect_urls = [ "https://app.snaptip.tech/auth/callback" ]
