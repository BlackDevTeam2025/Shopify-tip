query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      tipSource: attribute(key: "_tip_source") {
        value
      }
      legacyTipSource: attribute(key: "tip_source") {
        value
      }
      tipMode: attribute(key: "_tip_mode") {
        value
      }
      legacyTipMode: attribute(key: "tip_mode") {
        value
      }
      tipPercentage: attribute(key: "_tip_percentage") {
        value
      }
      legacyTipPercentage: attribute(key: "tip_percentage") {
        value
      }
      tipAmount: attribute(key: "_tip_amount") {
        value
      }
      legacyTipAmount: attribute(key: "tip_amount") {
        value
      }
      tipLabel: attribute(key: "_tip_label") {
        value
      }
      legacyTipLabel: attribute(key: "tip_label") {
        value
      }
      merchandise {
        ... on ProductVariant {
          id
          title
          product {
            title
          }
        }
      }
    }
  }
}
